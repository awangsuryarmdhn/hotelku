{% for guest in guests %}
<div class="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg cursor-pointer"
     onclick="document.getElementById('id_guest').value='{{ guest.pk }}'; this.closest('.dropdown').querySelector('summary').textContent='{{ guest.full_name }}';">
    <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold">{{ guest.initials }}</div>
    <div>
        <div class="text-sm font-medium">{{ guest.full_name }}</div>
        <div class="text-xs text-slate-400">{{ guest.phone }}</div>
    </div>
</div>
{% empty %}
<p class="text-sm text-slate-400 p-2">Tamu tidak ditemukan</p>
{% endfor %}

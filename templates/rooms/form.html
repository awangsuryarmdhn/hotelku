{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-xl border border-slate-200 p-6">
        <form method="post">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                {% for field in form %}
                <div class="form-control {% if field.name == 'notes' or field.name == 'description' or field.name == 'amenities' or field.name == 'special_requests' or field.name == 'address' %}md:col-span-2{% endif %}">
                    <label class="label">
                        <span class="label-text font-semibold text-slate-700">{{ field.label }}</span>
                    </label>
                    {{ field }}
                    {% if field.help_text %}
                    <label class="label"><span class="label-text-alt text-slate-400">{{ field.help_text }}</span></label>
                    {% endif %}
                    {% if field.errors %}
                    <label class="label"><span class="label-text-alt text-error">{{ field.errors.0 }}</span></label>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <div class="flex gap-3 mt-6 pt-4 border-t border-slate-200">
                <button type="submit" class="btn btn-manta rounded-lg">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    Save
                </button>
                <a href="javascript:history.back()" class="btn btn-ghost rounded-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
